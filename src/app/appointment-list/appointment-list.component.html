<div>
  <input [(ngModel)]="newAppointmentTitle" placeholder = "Appointment Title" >
  <input [(ngModel)]="newAppointmentDate" type="date" placeholder = "Appointment Date" >
  <button (click) = "addAppointment()" >Add</button>
</div>

<ul>
  <li *ngFor = "let eachAppointment of appointments" >
      {{eachAppointment.id}} {{eachAppointment.title}} {{eachAppointment.date | date: 'shortDate'}}
      <button (click) = "deleteAppointment(appointments.indexOf(eachAppointment))" >Delete</button>
  </li>
</ul>
